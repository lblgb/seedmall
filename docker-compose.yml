# SeedMall 本地开发基础设施，提供 Nacos、MySQL、Redis 和 RocketMQ。
services:
  mysql:
    image: mysql:8.4
    container_name: seedmall-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
      - --default-time-zone=+08:00
    volumes:
      - seedmall-mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p${MYSQL_ROOT_PASSWORD:-root} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  nacos:
    image: nacos/nacos-server:v2.3.2
    container_name: seedmall-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XMN: 128m
      TZ: Asia/Shanghai
    ports:
      - "${NACOS_PORT:-8848}:8848"
      - "${NACOS_GRPC_PORT:-9848}:9848"
      - "${NACOS_RAFT_PORT:-9849}:9849"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8848/nacos/actuator/health | grep -q UP"]
      interval: 15s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7.2
    container_name: seedmall-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - seedmall-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rocketmq-namesrv:
    image: apache/rocketmq:5.3.4
    container_name: seedmall-rocketmq-namesrv
    restart: unless-stopped
    command: sh mqnamesrv
    ports:
      - "${ROCKETMQ_NAMESRV_PORT:-9876}:9876"
    healthcheck:
      test: ["CMD-SHELL", "sh mqadmin clusterList -n 127.0.0.1:9876 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  rocketmq-broker:
    image: apache/rocketmq:5.3.4
    container_name: seedmall-rocketmq-broker
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
      JAVA_OPT_EXT: -Duser.home=/home/rocketmq -Xms256m -Xmx512m
      TZ: Asia/Shanghai
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/broker.conf
    ports:
      - "${ROCKETMQ_BROKER_FAST_PORT:-10909}:10909"
      - "${ROCKETMQ_BROKER_PORT:-10911}:10911"
      - "${ROCKETMQ_BROKER_HA_PORT:-10912}:10912"
    volumes:
      - ./docker/rocketmq/broker.conf:/home/rocketmq/broker.conf:ro
      - seedmall-rocketmq-store:/home/rocketmq/store
    healthcheck:
      test: ["CMD-SHELL", "sh mqadmin brokerStatus -n rocketmq-namesrv:9876 -b 127.0.0.1:10911 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  seedmall-mysql-data:
  seedmall-redis-data:
  seedmall-rocketmq-store:
